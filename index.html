// ─── SRS ENGINE ─────────────────────────────────────────────────────
const HOUR = 60;
const DAY = 60 * 24;
const NEW_CARDS_PER_SESSION = 10;

const mkSRS = (id) => ({ id, iv: 0, rep: 0, ef: 2.5, next: 0, last: 0, isNew: true });

function gradeSRS(c, q) {
  let { iv, rep, ef } = c;
  if (q === 0) { rep = 0; iv = 0.5; }
  else if (q === 1) {
    iv = 1;
  } else if (q === 2) {
    rep++;
    if (rep === 1) iv = 3;
    else if (rep === 2) iv = 1 * DAY;
    else iv = Math.round(iv * ef);
  } else {
    rep++;
    if (rep === 1) iv = 1 * DAY;
    else if (rep === 2) iv = 4 * DAY;
    else iv = Math.round(iv * ef * 1.3);
  }
  ef = Math.max(1.3, ef + (0.1 - (3 - q) * (0.08 + (3 - q) * 0.02)));
  const easyMastered = q === 3 ? true : (c.easyMastered || false);
  return { ...c, iv, rep, ef, easyMastered, next: Date.now() + iv * 60000, last: Date.now(), isNew: false };
}

// ─── VOICE ──────────────────────────────────────────────────────────
let cachedVoice = null;

function getBestSpanishVoice() {
  if (cachedVoice) return cachedVoice;
  const voices = window.speechSynthesis?.getVoices() || [];
  const spanish = voices.filter(v => v.lang.startsWith("es"));
  if (!spanish.length) return null;
  const score = (v) => {
    let s = 0;
    const name = v.name.toLowerCase();
    if (name.includes("premium") || name.includes("enhanced") || name.includes("neural")) s += 100;
    if (name.includes("natural")) s += 80;
    if (v.lang === "es-MX") s += 40;
    if (v.lang === "es-419") s += 30;
    if (v.lang === "es-US") s += 25;
    if (name.includes("google")) s += 20;
    if (name.includes("paulina") || name.includes("mónica") || name.includes("monica")) s += 15;
    if (!v.localService) s += 10;
    return s;
  };
  spanish.sort((a, b) => score(b) - score(a));
  cachedVoice = spanish[0];
  return cachedVoice;
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = getBestSpanishVoice();
  if (voice) { u.voice = voice; u.lang = voice.lang; } else { u.lang = "es-MX"; }
  u.rate = 0.92; u.pitch = 1.0; u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

// ─── AI EXTRACTION (Groq — free tier) ───────────────────────────────
const API_KEY_KEY = "habla-api-key";

async function extractCards(text, alreadyFound) {
  const apiKey = localStorage.getItem(API_KEY_KEY);
  if (!apiKey) throw new Error("No API key set. Go to Settings → API Key and enter your Groq API key.");

  const words = text.split(/\s+/);
  const trimmed = words.length > 3000 ? words.slice(0, 3000).join(" ") + "\n\n[transcript truncated]" : text;

  const skipList = alreadyFound && alreadyFound.length > 0
    ? "\n\nIMPORTANT: You have ALREADY extracted these words. Do NOT include any of them again:\n" + alreadyFound.join(", ")
    : "";

  const systemPrompt = `You extract Spanish vocabulary from text for a flashcard app. Return ONLY a valid JSON array. No markdown fences, no backticks, no explanation text before or after. Just the raw JSON array.

Each object: {"spanish":"...","english":"...","type":"word"|"phrase"}

Rules:
- Extract ALL useful vocabulary words and phrases from the text — do not limit yourself
- Include every distinct word and phrase a Spanish learner would benefit from
- Mix of individual words AND useful multi-word phrases/expressions
- For verbs give infinitive form
- Keep phrases under 10 words
- Skip only the most basic filler words (y, el, la, de, en, a, que, un, una, los, las) unless part of a useful phrase
- type="word" for 1 word, type="phrase" for 2+ words

CRITICAL: Your entire response must be valid JSON. Start with [ and end with ]. Nothing else.`;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey,
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [
        { role: "system", content: systemPrompt },
        { role: "user", content: "Extract ALL vocabulary from this Spanish text:" + skipList + "\n\n" + trimmed },
      ],
      max_tokens: 4096,
      temperature: 0.2,
    }),
  });

  if (!res.ok) {
    const errText = await res.text().catch(() => "");
    if (res.status === 401) throw new Error("Invalid API key. Check your key in Settings → API Key.");
    throw new Error("API error " + res.status + ": " + errText.slice(0, 300));
  }

  const data = await res.json();
  if (data.error) throw new Error("API: " + (data.error.message || JSON.stringify(data.error)));

  const raw = (data.choices || []).map(c => c.message?.content || "").join("");
  if (!raw.trim()) throw new Error("Empty response from API");

  const clean = raw.replace(/```json\s*/g, "").replace(/```\s*/g, "").trim();
  try {
    return JSON.parse(clean);
  } catch (parseErr) {
    const match = clean.match(/\[[\s\S]*\]/);
    if (match) return JSON.parse(match[0]);
    throw new Error("Could not parse response as JSON");
  }
}

        if (existingPreview) setErr("No additional vocabulary found — looks like we got everything!");

      const existing = new Set(ALL_RAW.map(c => c.spanish.toLowerCase().trim()));

          const projPct = projCards.length ? Math.round((projMastered/projCards.length)*100) : 0;
          return <>
            <button className="proj-back" onClick={()=>{setProjView("list");setPreview(null);setErr("");setOk("")}}>← All Projects</button>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:800,marginBottom:4}}>{activeProj}</div>

            {projCards.length > 0 && <>
              <div className="sb" style={{marginTop:12}}>
                <div className="sp"><div className="sn" style={{fontSize:18}}>{projCards.length}</div><div className="sl">Cards</div></div>
                <div className="sp"><div className="sn" style={{fontSize:18}}>{projSeen}</div><div className="sl">Seen</div></div>
                <div className="sp"><div className="sn" style={{fontSize:18}}>{projMastered}</div><div className="sl">Mastered</div></div>
              </div>
              <div className="pb" style={{marginBottom:4}}><div className="pf" style={{width:projPct+"%"}}/></div>
              <div style={{fontSize:11,color:'var(--t3)',textAlign:'right',marginBottom:16}}>{projPct}% complete</div>

              <button className="ib" style={{marginTop:0,marginBottom:12}} onClick={()=>{setSource(activeProj);setTab("study");setRevealed(false)}}>
                Study This Project
              </button>
            </>}

            <div className="sc">
              <div className="sh">Import Transcript</div>
              <textarea className="ta" placeholder={"Paste Spanish transcript for this project...\n\ne.g. subtitles, dialogue, transcript..."} value={txt} onChange={e=>setTxt(e.target.value)}/>
              <button className="ib" disabled={!txt.trim()||busy} onClick={()=>doExtract(null)}>
                {busy?<span>Extracting vocabulary<span className="ld"></span></span>:"Extract Vocabulary"}
              </button>
              {err&&<div className="ie">{err}</div>}
              {ok&&<div className="io">{ok}</div>}
            </div>

            {preview&&<div className="sc ai">
              {(()=>{
                const selectable = preview.map((c,i)=>({c,i})).filter(({c})=>!c.isDupe);
                const selectedCount = selectable.filter(({i})=>!excluded[i]).length;
                const dupeCount = preview.filter(c=>c.isDupe).length;
                return <>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div className="sh" style={{marginBottom:0}}>{selectedCount} selected{dupeCount>0?" · "+dupeCount+" in deck":""}</div>
                    <div style={{display:'flex',gap:6}}>
                      <button className="lf on" style={{fontSize:10,padding:'4px 10px'}} onClick={()=>setExcluded({})}>All</button>
                      <button className="lf" style={{fontSize:10,padding:'4px 10px'}} onClick={()=>{const ex={};preview.forEach((c,i)=>{if(!c.isDupe)ex[i]=true});setExcluded(ex)}}>None</button>
                    </div>
                  </div>
                  {preview.map((c,i)=>{
                    const isOut = excluded[i];
                    return <div key={i} className="pc" style={{opacity:c.isDupe?.35:isOut?.5:1,cursor:c.isDupe?'default':'pointer'}}
                      onClick={()=>{if(!c.isDupe){const ne={...excluded};ne[i]?delete ne[i]:ne[i]=true;setExcluded(ne)}}}>
                      {!c.isDupe && <span style={{fontSize:18,flexShrink:0,width:24,textAlign:'center'}}>{isOut?"☐":"☑"}</span>}
                      <button className="ps" onClick={e=>{e.stopPropagation();speak(c.spanish)}}>🔊</button>
                      <span className="pe" style={{textDecoration:isOut?'line-through':'none'}}>{c.spanish}</span>
                      <span className="pn">{c.english}</span>
                      {c.isDupe ? <span className="pt" style={{background:'#7f1d1d33',color:'var(--rd)',border:'1px solid #7f1d1d'}}>exists</span> : <span className="pt">{c.type}</span>}
                    </div>
                  })}
                  <button className="ib" onClick={doImport} disabled={selectedCount===0}>Add {selectedCount} Cards to Project</button>
                </>;
              })()}
              <button className="ib2" style={{background:'var(--amd)',borderColor:'var(--am)',color:'var(--am)'}} disabled={busy} onClick={()=>doExtract(preview)}>
                {busy ? <span>Extracting more<span className="ld"></span></span> : "Extract More Vocabulary"}
              </button>
              <button className="ib2" onClick={()=>setPreview(null)}>Cancel</button>
            </div>}

            {projCards.length > 0 && <div className="sc">
              <div className="sh">Cards in this project</div>
              {projCards.map(c=>{
                const st = getStatus(c.id);
                return (
                  <div key={c.id} className="pc" style={{flexWrap:'wrap'}}>
                    <button className="ps" onClick={()=>speak(c.spanish)}>🔊</button>
                    <span className="pe">{c.spanish}</span>
                    <span className="pn">{c.english}</span>
                    <span className={"lib-badge "+st} style={{flexShrink:0}}>{st}</span>
                  </div>
                );
              })}
            </div>}

            <button className="rb" style={{marginTop:4}} onClick={()=>{delSrc(activeProj);setProjView("list")}}>Delete This Project</button>
          </>;
        })()}
      </div>}

      {tab==="library"&&<div className="ai">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:800}}>Library</div>
          <button className="ib" style={{width:'auto',marginTop:0,padding:'8px 16px',fontSize:13}} onClick={()=>{setQcOpen(!qcOpen);setQcResult(null);setQcErr("");setQcOk("")}}>{qcOpen?"Close":"+ Create Card"}</button>
        </div>
        <p style={{fontSize:12,color:'var(--t3)',marginBottom:16}}>{ALL.length} active · {prioCount} prioritized · {hiddenCount} hidden · Tap ⭐ to learn first</p>

        {qcOpen&&<div className="sc" style={{marginBottom:16}}>
          <div className="sh">Quick Create</div>
          <div style={{fontSize:13,color:'var(--t3)',marginBottom:12}}>Type in English — it'll translate to Spanish and create a flashcard.</div>
          <input className="ip" style={{marginTop:0}} placeholder="Type English word or sentence..." value={qcInput} onChange={e=>setQcInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")doTranslate()}}/>
          <button className="ib" disabled={!qcInput.trim()||qcBusy} onClick={doTranslate}>
            {qcBusy?<span>Translating<span className="ld"></span></span>:"Translate to Spanish"}
          </button>
          {qcErr&&<div className="ie">{qcErr}</div>}
          {qcResult&&<div style={{marginTop:12,padding:16,background:'var(--bg)',border:'1px solid var(--s3)',borderRadius:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{fontSize:20,fontWeight:700,color:'var(--am)'}}>{qcResult.spanish}</span>
              <button className="ps" onClick={()=>speak(qcResult.spanish)}>🔊</button>
            </div>
            <div style={{fontSize:14,color:'var(--t2)',marginBottom:12}}>{qcResult.english}</div>
            <span className="pt" style={{marginBottom:12,display:'inline-block'}}>{qcResult.type}</span>
            <button className="ib" style={{marginTop:8}} onClick={doSaveCard}>Add to Flashcards</button>
          </div>}
          {qcOk&&<div className="io">{qcOk}</div>}
        </div>}

        <div className="lib-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input className="lib-search" placeholder="Search Spanish or English..." value={libSearch} onChange={e=>setLibSearch(e.target.value)}/>
        </div>

        <div className="lib-filters">
          {["all","priority","new","learning","mastered","hidden"].map(s=>(
            <button key={s} className={"lf"+(libStatus===s?" on":"")} onClick={()=>setLibStatus(s)}>
              {s==="all"?"All":s==="priority"?"⭐ Priority":s==="new"?"New":s==="learning"?"Learning":s==="mastered"?"Mastered":"🗑 Hidden"+(hiddenCount?" ("+hiddenCount+")":"")}
            </button>
          ))}
        </div>
        <div className="lib-filters">
          {["all","word","phrase"].map(f=>(
            <button key={f} className={"lf"+(libFilter===f?" on":"")} onClick={()=>setLibFilter(f)}>
              {f==="all"?"All Types":f==="word"?"Words":"Phrases"}
            </button>
          ))}
          <select style={{background:'var(--s1)',border:'1px solid var(--s2)',color:'var(--t2)',padding:'5px 10px',borderRadius:100,fontSize:12,fontFamily:'inherit',appearance:'none',cursor:'pointer'}} value={libSource} onChange={e=>setLibSource(e.target.value)}>
            {SOURCES_LIST.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>

        <div className="lib-count">{libCards.length} card{libCards.length!==1?"s":""}</div>

        {libCards.map(c=>{
          const st = getStatus(c.id);
          const isHidden = !!hidden[c.id];
          return (
            <div key={c.id} className="lib-row">
              {!isHidden && <button className="lib-star" onClick={()=>togglePrio(c.id)}>{prio[c.id]?"⭐":"☆"}</button>}
              <button className="ps" onClick={()=>speak(c.spanish)}>🔊</button>
              <div className="lib-info">
                <div className="lib-es">{c.spanish}</div>
                <div className="lib-en">{c.english}</div>
              </div>
              <div className="lib-meta">
                {!isHidden && <span className={"lib-badge "+st}>{st}</span>}
                <span style={{fontSize:9,color:'var(--t3)'}}>{c.type}</span>
              </div>
              {isHidden ? (
                <button className="lib-restore" onClick={async()=>{const nh={...hidden};delete nh[c.id];setHidden(nh);await saveData(HIDDEN_KEY,nh)}}>↩</button>
              ) : (
                <button className="lib-del" onClick={()=>hideCard(c.id)}>✕</button>
              )}
            </div>
          );
        })}

        {libCards.length===0&&<div style={{textAlign:'center',padding:'40px 20px',color:'var(--t3)',fontSize:14}}>No cards match your filters</div>}
      </div>}

      {tab==="stats"&&<div className="ai">
        <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:800,marginBottom:20}}>Progress</div>
        <div className="sg">
          <div className="sk2"><div className="sn" style={{color:'var(--am)'}}>{ALL.length}</div><div className="sl">Total</div></div>
          <div className="sk2"><div className="sn" style={{color:'var(--gn)'}}>{mastered}</div><div className="sl">Mastered</div></div>
          <div className="sk2"><div className="sn" style={{color:'var(--bl)'}}>{seen}</div><div className="sl">Seen</div></div>
          <div className="sk2"><div className="sn" style={{color:'var(--rd)'}}>{due.length}</div><div className="sl">Due</div></div>
        </div>
        <div className="sc"><div className="sh">Mastery</div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--t2)',marginBottom:8}}><span>{mastered} mastered</span><span>{ALL.length} total</span></div>
          <div className="pb"><div className="pf" style={{width:(ALL.length?(mastered/ALL.length)*100:0)+"%"}}/></div>
        </div>
        <div className="sc"><div className="sh">By Source</div>
          {[...new Set(ALL.map(c=>c.source))].map(s=>{const sc=ALL.filter(c=>c.source===s);const sm=sc.filter(c=>(srs[c.id]?.rep||0)>=3).length;return(
            <div key={s} style={{marginBottom:16}}><div style={{display:'flex',justifyContent:'space-between',fontSize:13,color:'var(--t2)',marginBottom:6}}><span>{s}</span><span>{sm}/{sc.length}</span></div>
            <div className="pb"><div className="pf" style={{width:(sc.length?(sm/sc.length)*100:0)+"%"}}/></div></div>
          )})}
        </div>
      </div>}

      {tab==="settings"&&<div className="ai">
        <div style={{fontFamily:"'Fraunces',serif",fontSize:24,fontWeight:800,marginBottom:20}}>Settings</div>
        <div className="sc"><div className="sh">Study Direction</div>
          <div className="sr"><span style={{fontSize:14,color:'var(--t2)'}}>Spanish → English</span><button className={"tg"+(dir==="es-en"?" on":"")} onClick={()=>{setDir("es-en");setRevealed(false)}}/></div>
          <div className="sr"><span style={{fontSize:14,color:'var(--t2)'}}>English → Spanish</span><button className={"tg"+(dir==="en-es"?" on":"")} onClick={()=>{setDir("en-es");setRevealed(false)}}/></div>
        </div>
        <div className="sc"><div className="sh">Voice</div>
          <div className="sr"><span style={{fontSize:14,color:'var(--t2)'}}>Test pronunciation</span><button className="spk" style={{marginTop:0}} onClick={()=>speak("¡Hola! Estoy aprendiendo español")}>🔊</button></div>
          <div style={{fontSize:12,color:'var(--t3)',padding:'8px 0 4px',lineHeight:1.5}}>
            Using: <span style={{color:'var(--am)'}}>{getBestSpanishVoice()?.name || "Default"}</span>
            <br/>({getBestSpanishVoice()?.lang || "es"})
          </div>
          <div style={{fontSize:11,color:'var(--t3)',padding:'8px 0',lineHeight:1.6,borderTop:'1px solid var(--s2)',marginTop:8}}>
            For better voices on <b>iPhone</b>: Settings → Accessibility → Spoken Content (or Read & Speak) → Voices → Spanish (Mexico) → download an Enhanced voice
            <br/><br/>
            On <b>Android</b>: Settings → System → Language → Text-to-Speech → install Google high-quality voices
          </div>
        </div>
        <div className="sc"><div className="sh">Cloud Sync</div>
          <div style={{fontSize:13,color:'var(--t3)',marginBottom:12,lineHeight:1.5}}>Sync your data across all devices automatically. Enter the same sync ID on every device you want to keep in sync.</div>
          <input className="ip" style={{marginTop:0}} placeholder="Enter a sync ID (e.g. your name)" value={syncId} onChange={e=>{
            const val = e.target.value;
            setSyncId(val);
            if (val.trim()) {
              localStorage.setItem(SYNC_ID_KEY, val.trim());
            } else {
              localStorage.removeItem(SYNC_ID_KEY);
            }
          }}/>
          {syncId && <div style={{display:'flex',gap:8,marginTop:12}}>
            <button className="ib" style={{flex:1,marginTop:0}} onClick={async()=>{
              setSyncStatus("Uploading...");
              const s = await loadData(SRS_KEY); const c = await loadData(CUSTOM_KEY); const p = await loadData(PRIO_KEY); const h = await loadData(HIDDEN_KEY);
              await cloudSave(SRS_KEY, s || {}); await cloudSave(CUSTOM_KEY, c || []); await cloudSave(PRIO_KEY, p || {}); await cloudSave(HIDDEN_KEY, h || {});
              setSyncStatus("Uploaded! Open this app on your other device with the same sync ID.");
            }}>Push to Cloud</button>
            <button className="ib2" style={{flex:1,marginTop:0}} onClick={async()=>{
              setSyncStatus("Downloading...");
              const cloud = await cloudLoad(syncId.trim());
              if (cloud) {
                if (cloud[SRS_KEY]) { setSrs(cloud[SRS_KEY]); localStorage.setItem(SRS_KEY, JSON.stringify(cloud[SRS_KEY])); }
                if (cloud[CUSTOM_KEY]) { setCustom(cloud[CUSTOM_KEY]); localStorage.setItem(CUSTOM_KEY, JSON.stringify(cloud[CUSTOM_KEY])); }
                if (cloud[PRIO_KEY]) { setPrio(cloud[PRIO_KEY]); localStorage.setItem(PRIO_KEY, JSON.stringify(cloud[PRIO_KEY])); }
                if (cloud[HIDDEN_KEY]) { setHidden(cloud[HIDDEN_KEY]); localStorage.setItem(HIDDEN_KEY, JSON.stringify(cloud[HIDDEN_KEY])); }
                setSyncStatus("Downloaded! Your data is now synced.");
              } else {
                setSyncStatus("No cloud data found for this sync ID. Push first from another device.");
              }
            }}>Pull from Cloud</button>
          </div>}
          {syncStatus && <div className="io" style={{marginTop:8}}>{syncStatus}</div>}
          {syncId && <div style={{fontSize:11,color:'var(--t3)',marginTop:8}}>Auto-sync: every change you make will automatically save to the cloud. Pull from cloud when you open the app on a new device.</div>}
        </div>

        <div className="sc"><div className="sh">API Key</div>
          <div style={{fontSize:13,color:'var(--t3)',marginBottom:12,lineHeight:1.5}}>Enter your Groq API key to enable free AI vocabulary extraction in Projects. Get one free at console.groq.com/keys. Your key is stored locally on this device only.</div>
          <input className="ip" style={{marginTop:0}} type="password" placeholder="gsk_..." value={apiKey} onChange={e=>{setApiKey(e.target.value);localStorage.setItem(API_KEY_KEY,e.target.value)}}/>
          {apiKey && <div style={{fontSize:12,color:'var(--gn)',marginTop:8}}>Key saved ({apiKey.slice(0,6)}...)</div>}
        </div>

        <div className="sc"><div className="sh">Data</div>
          <div style={{fontSize:13,color:'var(--t3)',marginBottom:12}}>{BASE_CARDS.length} built-in + {custom.length} imported = {ALL_RAW.length} total · {hiddenCount} hidden · {ALL.length} active.</div>
          {hiddenCount > 0 && <button style={{width:'100%',padding:14,borderRadius:12,background:'#14532d',border:'1px solid #166534',color:'var(--gn)',fontFamily:'inherit',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:8}} onClick={()=>{if(confirm("Restore all "+hiddenCount+" hidden cards?"))unhideAll()}}>Restore {hiddenCount} Hidden Cards</button>}
          <button className="rb" onClick={()=>{if(confirm("Reset all progress?"))resetAll()}}>Reset All Progress</button>
        </div>

        <div className="sc"><div className="sh">Transfer to Another Device</div>
          <div style={{fontSize:13,color:'var(--t3)',marginBottom:14,lineHeight:1.5}}>Move your projects, progress, and settings between devices.</div>

          {!syncMode && <div style={{display:'flex',gap:8}}>
            <button className="ib" style={{flex:1,marginTop:0}} onClick={doExport}>Export Data</button>
            <button className="ib2" style={{flex:1,marginTop:0}} onClick={()=>{setSyncMode("import");setSyncCode("");setSyncMsg("")}}>Import Data</button>
          </div>}

          {syncMode==="export" && <>
            <div style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>Copy this code, then paste it on your other device using Import:</div>
            <textarea className="ta" style={{minHeight:100,fontSize:11,wordBreak:'break-all'}} readOnly value={syncCode} onClick={e=>{e.target.select();navigator.clipboard?.writeText(syncCode).then(()=>setSyncMsg("Copied!"))}}/>
            {syncMsg && <div className="io">{syncMsg}</div>}
            <button className="ib2" style={{marginTop:8}} onClick={()=>{setSyncMode(null);setSyncCode("");setSyncMsg("")}}>Done</button>
          </>}

          {syncMode==="import" && <>
            <div style={{fontSize:12,color:'var(--t2)',marginBottom:8}}>Paste the export code from your other device:</div>
            <textarea className="ta" style={{minHeight:100,fontSize:11}} placeholder="Paste export code here..." value={syncCode} onChange={e=>setSyncCode(e.target.value)}/>
            <button className="ib" disabled={!syncCode.trim()} onClick={doImportSync}>Load Data</button>
            {syncMsg && <div className={syncMsg.startsWith("Invalid")?"ie":"io"}>{syncMsg}</div>}
            <button className="ib2" style={{marginTop:4}} onClick={()=>{setSyncMode(null);setSyncCode("");setSyncMsg("")}}>Cancel</button>
          </>}
        </div>
      </div>}

      <div className="bn">
        <button className={"nb"+(tab==="study"?" on":"")} onClick={()=>setTab("study")}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>Study</button>
        <button className={"nb"+(tab==="library"?" on":"")} onClick={()=>setTab("library")}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
        <button className={"nb"+(tab==="projects"?" on":"")} onClick={()=>{setTab("projects");setProjView("list")}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Projects</button>
        <button className={"nb"+(tab==="stats"?" on":"")} onClick={()=>setTab("stats")}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Stats</button>
        <button className={"nb"+(tab==="settings"?" on":"")} onClick={()=>setTab("settings")}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Settings</button>
      </div>
    </div>
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
